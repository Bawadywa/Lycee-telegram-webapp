<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Lycee — Transactions</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg: #0f0f10;
      --text: #ffffff;
      --hint: #a1a1aa;
      --button: #2ea6ff;
      --button_text: #ffffff;
      --secondary_bg: #1c1c1e;
      --field_bg: rgba(255,255,255,.06);
      --field_border: rgba(255,255,255,.14);
      --field_focus: rgba(46,166,255,.28);
      --card_bg: rgba(255,255,255,.05);
      --border: rgba(255,255,255,.10);
      --radius: 14px;
      --grad: linear-gradient(135deg,#4ade80 0%,#2dd4bf 50%,#a855f7 100%);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; }

    body{
      font-family:'Inter',system-ui,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:14px 16px 32px;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body::before{
      content:"";
      position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(55% 40% at 0% 0%, rgba(74,222,128,.12), transparent 60%),
        radial-gradient(50% 40% at 100% 100%, rgba(168,85,247,.13), transparent 60%);
    }

    h1,h2,h3{ font-family:'Manrope',system-ui,Arial,sans-serif; letter-spacing:-.01em; margin:0; }
    .gradient{
      background:var(--grad);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; color:transparent;
    }

    /* 3-zone bar: brand left, actions CENTER, right corner left free for
       Telegram's native close/menu buttons (which otherwise cover ours). */
    .topbar{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; margin-bottom:14px; }
    .brand{
      justify-self:start;
      font-family:'Manrope'; font-weight:800; font-size:22px; line-height:1;
      background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .actions{ justify-self:center; display:flex; gap:8px; }
    .icon-btn{
      display:inline-flex; align-items:center; gap:6px;
      width:auto; margin:0; padding:8px 12px;
      background:var(--card_bg); border:1px solid var(--border);
      color:var(--text); border-radius:999px; font-weight:700; font-size:13px;
      cursor:pointer; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      transition:border-color .2s, background .2s;
    }
    .icon-btn:active{ transform:translateY(1px); }
    .icon-btn svg{ width:18px; height:18px; display:block; }
    .icon-btn .lbl{ transform:translateY(1px); }

    .tabs{
      display:flex; gap:6px; padding:5px; margin-bottom:18px;
      background:var(--card_bg); border:1px solid var(--border);
      border-radius:999px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .tab{
      flex:1; display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:auto; margin:0; padding:11px 12px; border-radius:999px;
      text-decoration:none; color:var(--hint); font-weight:700; font-size:14px;
      transition:color .2s, background .2s;
    }
    .tab.active{ color:#fff; background:var(--grad); }
    .badge{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:20px; height:20px; padding:0 6px; border-radius:999px;
      font-size:12px; font-weight:800; background:var(--border); color:var(--text);
    }
    .tab.active .badge{ background:rgba(255,255,255,.28); color:#fff; }

    .card{
      background:var(--card_bg); border:1px solid var(--border);
      border-radius:20px; padding:18px;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    }
    .head{ display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:6px; }
    .title{ font-size:24px; font-weight:800; }
    .subtitle{ color:var(--hint); margin:6px 0 14px; font-size:14px; }
    .count-pill{
      flex:none; padding:5px 12px; border-radius:999px; font-weight:800; font-size:13px;
      color:#fff; background:var(--grad); white-space:nowrap;
    }

    /* ---------- Table ---------- */
    .table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; }
    table{ width:100%; border-collapse:collapse; font-size:14px; }
    thead th{
      text-align:left; padding:10px 10px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.1em; color:var(--hint);
      border-bottom:2px solid transparent; border-image:var(--grad) 1; white-space:nowrap;
    }
    thead th.right{ text-align:right; }
    tbody td{ padding:13px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
    tbody tr:last-child td{ border-bottom:none; }
    .t-date{ white-space:nowrap; color:var(--text); }
    .t-total{ font-weight:800; text-align:right; white-space:nowrap; }
    .t-comment{ color:var(--hint); max-width:160px; }
    .cur-chip{
      display:inline-block; padding:3px 9px; border-radius:999px;
      border:1px solid var(--border); font-size:12px; font-weight:700; white-space:nowrap;
    }
    .del{
      width:auto; margin:0; padding:4px 6px; background:transparent; border:none;
      color:var(--hint); cursor:pointer; font-size:16px; line-height:1; border-radius:8px;
    }
    .del:hover{ color:#f87171; }
    th.act, td.act{ width:34px; text-align:center; }

    /* ---------- Empty state ---------- */
    .empty{ text-align:center; padding:42px 16px 30px; }
    .empty-emoji{ font-size:40px; }
    .empty h3{ font-size:18px; font-weight:800; margin-top:12px; }
    .empty p{ color:var(--hint); font-size:14px; margin:8px 0 0; }

    /* ---------- Buttons ---------- */
    .footer-actions{ margin-top:16px; display:flex; flex-direction:column; gap:10px; }
    .btn-gradient{
      width:100%; margin:0; padding:14px; border:none; border-radius:999px;
      background:var(--grad); color:#fff; font-family:inherit; font-weight:800; font-size:16px; cursor:pointer;
      box-shadow:0 8px 24px rgba(45,212,191,.18);
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-ghost{
      width:100%; margin:0; padding:13px; background:transparent;
      border:1px solid var(--border); color:var(--text);
      border-radius:999px; font-family:inherit; font-weight:700; font-size:15px; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-link{
      display:inline-block; margin-top:18px; padding:12px 22px; width:auto;
      text-decoration:none; border-radius:999px; background:var(--grad);
      color:#fff; font-weight:800; font-size:15px;
    }
    .btn-gradient:active, .btn-ghost:active{ transform:translateY(1px); }
    .btn-gradient svg, .btn-ghost svg{ width:18px; height:18px; }

    .toast{
      position:fixed; left:50%; bottom:24px;
      transform:translateX(-50%) translateY(18px); opacity:0; pointer-events:none;
      background:var(--grad); color:#fff; padding:12px 20px; border-radius:999px;
      font-weight:700; font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,.35);
      transition:opacity .25s, transform .25s; z-index:50; max-width:90vw; text-align:center;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body data-scheme="dark">
  <header class="topbar">
    <div class="brand">Lycee</div>
    <div class="actions">
      <button class="icon-btn" id="langBtn" type="button" title="Language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18"/></svg>
        <span class="lbl" id="langLabel">EN</span>
      </button>
      <button class="icon-btn" id="fsBtn" type="button" title="Fullscreen">
        <svg id="fsExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <svg id="fsCompress" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
      </button>
    </div>
  </header>

  <nav class="tabs">
    <a class="tab" href="./index.html" data-i18n="tab.new">New</a>
    <a class="tab active" href="./table.html">
      <span data-i18n="tab.list">Transactions</span>
      <span class="badge" id="countBadge">0</span>
    </a>
  </nav>

  <main>
    <section class="card">
      <div class="head">
        <div>
          <h1 class="title gradient" data-i18n="table.title">Transactions</h1>
          <p class="subtitle" data-i18n="table.subtitle">Everything you've added so far.</p>
        </div>
      </div>

      <!-- Filled state -->
      <div id="content" style="display:none">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="th.date">Date</th>
                <th class="right" data-i18n="th.total">Total</th>
                <th data-i18n="th.currency">Currency</th>
                <th data-i18n="th.comment">Comment</th>
                <th class="act"></th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>

        <div class="footer-actions">
          <button class="btn-gradient" id="sendBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            <span data-i18n="btn.send">Send to Telegram</span>
          </button>
          <button class="btn-ghost" id="clearBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            <span data-i18n="btn.clear">Clear all</span>
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty" class="empty" style="display:none">
        <div class="empty-emoji">🧾</div>
        <h3 data-i18n="empty.title">No transactions yet</h3>
        <p data-i18n="empty.text">Create one or generate sample data on the New tab.</p>
        <a class="btn-link" href="./index.html" data-i18n="empty.cta">Go to New</a>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const tg = (window.Telegram && window.Telegram.WebApp) || {
      ready(){}, expand(){}, onEvent(){}, themeParams:{}, colorScheme:'dark',
      showAlert(m){ alert(m); }, showConfirm(m,cb){ cb(confirm(m)); }, sendData(){}, close(){},
      isFullscreen:false, HapticFeedback:{ notificationOccurred(){}, impactOccurred(){} }
    };
    tg.ready(); tg.expand();

    /* ---------------- i18n ---------------- */
    const dict = {
      en:{
        'tab.new':'New', 'tab.list':'Transactions',
        'table.title':'Transactions', 'table.subtitle':"Everything you've added so far.",
        'th.date':'Date', 'th.total':'Total', 'th.currency':'Currency', 'th.comment':'Comment',
        'empty.title':'No transactions yet',
        'empty.text':'Create one or generate sample data on the New tab.',
        'empty.cta':'Go to New',
        'btn.send':'Send to Telegram', 'btn.clear':'Clear all',
        'confirm.clear':'Delete all transactions?',
        'toast.cleared':'All cleared',
        'theme':'Theme'
      },
      uk:{
        'tab.new':'Нова', 'tab.list':'Транзакції',
        'table.title':'Транзакції', 'table.subtitle':'Усе, що ви додали.',
        'th.date':'Дата', 'th.total':'Сума', 'th.currency':'Валюта', 'th.comment':'Коментар',
        'empty.title':'Поки немає транзакцій',
        'empty.text':'Створіть або згенеруйте дані на вкладці «Нова».',
        'empty.cta':'До вкладки «Нова»',
        'btn.send':'Надіслати в Telegram', 'btn.clear':'Очистити все',
        'confirm.clear':'Видалити всі транзакції?',
        'toast.cleared':'Очищено',
        'theme':'Тема'
      }
    };
    let lang = localStorage.getItem('lycee_lang')
      || (((tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || '').startsWith('uk') ? 'uk' : 'en');
    const t = (k) => (dict[lang] && dict[lang][k]) || (dict.en[k] || k);
    const locale = () => (lang === 'uk' ? 'uk-UA' : 'en-US');

    function applyI18n(){
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.documentElement.lang = lang;
      document.getElementById('langLabel').textContent = (lang === 'uk') ? 'UA' : 'EN';
      render(); // re-render so dates / numbers re-localize
    }

    document.getElementById('langBtn').onclick = () => {
      lang = (lang === 'uk') ? 'en' : 'uk';
      localStorage.setItem('lycee_lang', lang);
      applyI18n();
    };

    /* ---------------- Theme ---------------- */
    function applyTheme(){
      const p = tg.themeParams || {};
      const scheme = tg.colorScheme === 'light' ? 'light' : 'dark';
      document.body.setAttribute('data-scheme', scheme);

      const bg          = p.bg_color          || (scheme === 'dark' ? '#0f0f10' : '#ffffff');
      const text        = p.text_color        || (scheme === 'dark' ? '#ffffff' : '#111111');
      const hint        = p.hint_color        || (scheme === 'dark' ? '#a1a1aa' : '#6b7280');
      const button      = p.button_color      || '#2ea6ff';
      const buttonText  = p.button_text_color || '#ffffff';
      const secondaryBg = p.secondary_bg_color|| (scheme === 'dark' ? '#1c1c1e' : '#f3f4f6');

      const card   = scheme === 'dark' ? 'rgba(255,255,255,.05)' : 'rgba(255,255,255,.65)';
      const border = scheme === 'dark' ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.10)';
      const fieldBg= scheme === 'dark' ? 'rgba(255,255,255,.06)' : '#ffffff';
      const fBorder= scheme === 'dark' ? 'rgba(255,255,255,.14)' : 'rgba(0,0,0,.15)';
      const focus  = scheme === 'dark' ? 'rgba(46,212,191,.28)' : 'rgba(46,212,191,.35)';

      const s = document.documentElement.style;
      s.setProperty('--bg', bg);
      s.setProperty('--text', text);
      s.setProperty('--hint', hint);
      s.setProperty('--button', button);
      s.setProperty('--button_text', buttonText);
      s.setProperty('--secondary_bg', secondaryBg);
      s.setProperty('--card_bg', card);
      s.setProperty('--border', border);
      s.setProperty('--field_bg', fieldBg);
      s.setProperty('--field_border', fBorder);
      s.setProperty('--field_focus', focus);

      if (typeof tg.setBackgroundColor === 'function') { try { tg.setBackgroundColor(bg); } catch(e){} }
      if (typeof tg.setHeaderColor === 'function')     { try { tg.setHeaderColor(bg); } catch(e){} }
    }
    applyTheme();
    if (typeof tg.onEvent === 'function') tg.onEvent('themeChanged', applyTheme);

    /* ---------------- Fullscreen ---------------- */
    const fsBtn = document.getElementById('fsBtn');
    const fsExpand = document.getElementById('fsExpand');
    const fsCompress = document.getElementById('fsCompress');
    function updateFsIcon(){
      const on = !!tg.isFullscreen;
      fsExpand.style.display = on ? 'none' : 'block';
      fsCompress.style.display = on ? 'block' : 'none';
    }
    fsBtn.onclick = () => {
      if (typeof tg.requestFullscreen !== 'function'){
        if (typeof tg.showAlert === 'function') tg.showAlert('Fullscreen is not supported on this Telegram version.');
        return;
      }
      if (tg.isFullscreen) tg.exitFullscreen(); else tg.requestFullscreen();
    };
    if (typeof tg.onEvent === 'function') tg.onEvent('fullscreenChanged', updateFsIcon);
    updateFsIcon();

    /* ---------------- Storage ---------------- */
    const KEY = 'lycee_tx';
    const loadTx = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } };
    const saveTx = (a) => localStorage.setItem(KEY, JSON.stringify(a));

    /* ---------------- Formatting ---------------- */
    function fmtNum(n){
      try { return new Intl.NumberFormat(locale(), { minimumFractionDigits:2, maximumFractionDigits:2 }).format(n); }
      catch(e){ return Number(n).toFixed(2); }
    }
    function fmtDate(iso){
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d)) return iso;
      try { return new Intl.DateTimeFormat(locale(), { day:'2-digit', month:'short', year:'numeric' }).format(d); }
      catch(e){ return iso; }
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    /* ---------------- Helpers ---------------- */
    function haptic(type){ try { tg.HapticFeedback && tg.HapticFeedback.notificationOccurred(type); } catch(e){} }
    let toastTimer;
    function showToast(msg){
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }
    function confirmThen(msg, cb){
      if (typeof tg.showConfirm === 'function') tg.showConfirm(msg, ok => { if (ok) cb(); });
      else if (confirm(msg)) cb();
    }

    /* ---------------- Render ---------------- */
    function render(){
      const txs = loadTx();
      document.getElementById('countBadge').textContent = txs.length;

      const content = document.getElementById('content');
      const empty = document.getElementById('empty');

      if (!txs.length){
        content.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      content.style.display = 'block';
      empty.style.display = 'none';

      const rows = document.getElementById('rows');
      rows.innerHTML = txs.map(tx => `
        <tr data-id="${escapeHtml(tx.id)}">
          <td class="t-date">${fmtDate(tx.date)}</td>
          <td class="t-total">${fmtNum(tx.total)}</td>
          <td><span class="cur-chip">${escapeHtml(tx.currency)}</span></td>
          <td class="t-comment">${escapeHtml(tx.comment || '—')}</td>
          <td class="act"><button class="del" type="button" aria-label="Delete">✕</button></td>
        </tr>
      `).join('');
    }

    /* ---------------- Actions ---------------- */
    document.getElementById('rows').addEventListener('click', (e) => {
      const btn = e.target.closest('.del');
      if (!btn) return;
      const id = btn.closest('tr').dataset.id;
      saveTx(loadTx().filter(tx => tx.id !== id));
      haptic('warning');
      render();
    });

    document.getElementById('clearBtn').onclick = () => {
      if (!loadTx().length) return;
      confirmThen(t('confirm.clear'), () => {
        saveTx([]);
        haptic('success');
        render();
        showToast(t('toast.cleared'));
      });
    };

    document.getElementById('sendBtn').onclick = () => {
      const txs = loadTx();
      if (!txs.length) return;
      try { tg.sendData(JSON.stringify({ transactions: txs })); tg.close(); }
      catch(e){ if (typeof tg.showAlert === 'function') tg.showAlert('Open inside Telegram to send.'); }
    };

    /* ---------------- Init ---------------- */
    applyI18n();
  </script>
</body>
</html>
