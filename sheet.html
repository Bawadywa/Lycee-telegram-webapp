<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Lycee — Google Sheet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js?v=6"></script>
  <script src="./api.js?v=6"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg: #0f0f10;
      --text: #ffffff;
      --hint: #a1a1aa;
      --button: #2ea6ff;
      --button_text: #ffffff;
      --secondary_bg: #1c1c1e;
      --field_bg: rgba(255,255,255,.06);
      --field_border: rgba(255,255,255,.14);
      --field_focus: rgba(46,166,255,.28);
      --card_bg: rgba(255,255,255,.05);
      --border: rgba(255,255,255,.10);
      --radius: 14px;
      --grad: linear-gradient(135deg,#4ade80 0%,#2dd4bf 50%,#a855f7 100%);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; }

    /* Sheet page fills the viewport so the embed can take all available space */
    body{
      font-family:'Inter',system-ui,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:14px 16px 16px;
      height:100vh; height:100dvh;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body::before{
      content:"";
      position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(55% 40% at 0% 0%, rgba(74,222,128,.12), transparent 60%),
        radial-gradient(50% 40% at 100% 100%, rgba(168,85,247,.13), transparent 60%);
    }

    h1,h2,h3{ font-family:'Manrope',system-ui,Arial,sans-serif; letter-spacing:-.01em; margin:0; }
    .gradient{
      background:var(--grad);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; color:transparent;
    }

    /* 3-zone bar: brand left, actions CENTER, right corner left free for
       Telegram's native close/menu buttons (which otherwise cover ours). */
    .topbar{ flex:none; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; margin-bottom:14px; }
    .brand{
      justify-self:start;
      font-family:'Manrope'; font-weight:800; font-size:22px; line-height:1;
      background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .actions{ justify-self:center; display:flex; gap:8px; }
    .icon-btn{
      display:inline-flex; align-items:center; gap:6px;
      width:auto; margin:0; padding:8px 12px;
      background:var(--card_bg); border:1px solid var(--border);
      color:var(--text); border-radius:999px; font-weight:700; font-size:13px;
      cursor:pointer; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      transition:border-color .2s, background .2s;
    }
    .icon-btn:active{ transform:translateY(1px); }
    .icon-btn svg{ width:18px; height:18px; display:block; }
    .icon-btn .lbl{ transform:translateY(1px); }
    /* Fullscreen toggle is only useful on desktop — mobile Telegram opens fullscreen by default */
    @media (hover:none) and (pointer:coarse){ .desktop-only{ display:none !important; } }

    .tabs{
      flex:none;
      display:flex; gap:6px; padding:5px; margin-bottom:18px;
      background:var(--card_bg); border:1px solid var(--border);
      border-radius:999px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .tab{
      flex:1; display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:auto; margin:0; padding:11px 10px; border-radius:999px; white-space:nowrap;
      text-decoration:none; color:var(--hint); font-weight:700; font-size:13px;
      transition:color .2s, background .2s;
    }
    .tab.active{ color:#fff; background:var(--grad); }
    .badge{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:20px; height:20px; padding:0 6px; border-radius:999px;
      font-size:12px; font-weight:800; background:var(--border); color:var(--text);
    }
    .tab.active .badge{ background:rgba(255,255,255,.28); color:#fff; }

    /* ---------- Sheet embed (fills remaining space) ---------- */
    main{ flex:1 1 auto; min-height:0; display:flex; }
    .sheet-card{
      flex:1 1 auto; min-height:0; display:flex;
      background:var(--card_bg); border:1px solid var(--border);
      border-radius:20px; padding:6px; overflow:hidden;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    }
    .sheet-frame{
      flex:1 1 auto; width:100%; min-height:0;
      border:none; border-radius:14px; background:#fff;
    }

    /* Empty / status state shown until a sheet URL is available */
    .sheet-empty{
      flex:1 1 auto; min-height:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center; gap:10px; padding:24px;
    }
    .sheet-empty .empty-emoji{ font-size:44px; }
    .sheet-empty h3{ font-size:18px; font-weight:800; }
    .sheet-empty p{ color:var(--hint); font-size:14px; margin:0; max-width:320px; }
    .sheet-empty .btn-gradient{
      width:auto; margin-top:8px; padding:13px 26px; border:none; border-radius:999px;
      background:var(--grad); color:#fff; font-family:inherit; font-weight:800; font-size:15px; cursor:pointer;
      box-shadow:0 8px 24px rgba(45,212,191,.18);
    }
    .sheet-empty .btn-gradient:disabled{ opacity:.6; cursor:default; }
    .icon-btn:disabled{ opacity:.6; cursor:default; }
    .spin{ animation:spin 1s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
  </style>
</head>
<body data-scheme="dark">
  <header class="topbar">
    <div class="brand">Lycee</div>
    <div class="actions">
      <button class="icon-btn" id="langBtn" type="button" title="Language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18"/></svg>
        <span class="lbl" id="langLabel">EN</span>
      </button>
      <button class="icon-btn desktop-only" id="fsBtn" type="button" title="Fullscreen">
        <svg id="fsExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <svg id="fsCompress" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
      </button>
      <button class="icon-btn" id="refreshBtn" type="button" title="Refresh sheet" style="display:none">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>
  </header>

  <nav class="tabs">
    <a class="tab" href="./index.html" data-i18n="tab.new">New</a>
    <a class="tab" href="./table.html">
      <span data-i18n="tab.list">Transactions</span>
      <span class="badge" id="countBadge">0</span>
    </a>
    <a class="tab active" href="./sheet.html" data-i18n="tab.sheet">Google Sheet</a>
  </nav>

  <main>
    <section class="sheet-card">
      <!-- src is set at runtime from the backend (GET/POST /google_sheet) -->
      <iframe id="sheetFrame" class="sheet-frame" title="Lycee Google Sheet" loading="lazy" style="display:none"></iframe>
      <div id="sheetEmpty" class="sheet-empty">
        <div class="empty-emoji" id="sheetEmoji">📊</div>
        <h3 id="sheetTitle" data-i18n="sheet.empty.title">No sheet yet</h3>
        <p id="sheetText" data-i18n="sheet.empty.text">Generate a published Google Sheet from your transactions.</p>
        <button class="btn-gradient" id="genBtn" type="button" data-i18n="sheet.generate">Generate sheet</button>
      </div>
    </section>
  </main>

  <script>
    /* ---------------- Telegram bootstrap (with standalone fallback) ---------------- */
    const tg = (window.Telegram && window.Telegram.WebApp) || {
      ready(){}, expand(){}, onEvent(){}, themeParams:{}, colorScheme:'dark',
      showAlert(m){ alert(m); }, isFullscreen:false,
      HapticFeedback:{ notificationOccurred(){}, impactOccurred(){} }
    };
    tg.ready(); tg.expand();

    /* ---------------- i18n ---------------- */
    const dict = {
      en:{
        'tab.new':'New', 'tab.list':'Transactions', 'tab.sheet':'Google Sheet', 'theme':'Theme',
        'sheet.empty.title':'No sheet yet',
        'sheet.empty.text':'Generate a published Google Sheet from your transactions.',
        'sheet.generate':'Generate sheet',
        'sheet.loading.title':'Generating…',
        'sheet.loading.text':'Building your published Google Sheet — this can take a moment.',
        'cfg.title':'Backend not configured',
        'cfg.text':'Set API_BASE in config.js to load your sheet.',
        'err.title':"Couldn't load the sheet",
        'err.text':'Check that the backend is running and reachable, then try again.'
      },
      uk:{
        'tab.new':'Нова', 'tab.list':'Транзакції', 'tab.sheet':'Google Sheet', 'theme':'Тема',
        'sheet.empty.title':'Таблиці ще немає',
        'sheet.empty.text':'Згенеруйте опубліковану Google-таблицю з ваших транзакцій.',
        'sheet.generate':'Згенерувати таблицю',
        'sheet.loading.title':'Генеруємо…',
        'sheet.loading.text':'Створюємо вашу опубліковану Google-таблицю — це може зайняти трохи часу.',
        'cfg.title':'Бекенд не налаштовано',
        'cfg.text':'Вкажіть API_BASE у config.js, щоб завантажити таблицю.',
        'err.title':'Не вдалося завантажити таблицю',
        'err.text':'Перевірте, що бекенд запущено та доступний, і спробуйте ще раз.'
      }
    };
    let lang = localStorage.getItem('lycee_lang')
      || (((tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || '').startsWith('uk') ? 'uk' : 'en');
    const t = (k) => (dict[lang] && dict[lang][k]) || (dict.en[k] || k);

    function applyI18n(){
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.documentElement.lang = lang;
      document.getElementById('langLabel').textContent = (lang === 'uk') ? 'UA' : 'EN';
      // restore the correct status message (the generic loop above resets it to the default)
      if (typeof applyEmptyText === 'function' &&
          document.getElementById('sheetEmpty').style.display !== 'none') applyEmptyText();
    }

    document.getElementById('langBtn').onclick = () => {
      lang = (lang === 'uk') ? 'en' : 'uk';
      localStorage.setItem('lycee_lang', lang);
      applyI18n();
    };

    /* ---------------- Theme (derive from Telegram, keep Lycee gradient) ---------------- */
    function applyTheme(){
      const p = tg.themeParams || {};
      const scheme = tg.colorScheme === 'light' ? 'light' : 'dark';
      document.body.setAttribute('data-scheme', scheme);

      const bg          = p.bg_color          || (scheme === 'dark' ? '#0f0f10' : '#ffffff');
      const text        = p.text_color        || (scheme === 'dark' ? '#ffffff' : '#111111');
      const hint        = p.hint_color        || (scheme === 'dark' ? '#a1a1aa' : '#6b7280');
      const button      = p.button_color      || '#2ea6ff';
      const buttonText  = p.button_text_color || '#ffffff';
      const secondaryBg = p.secondary_bg_color|| (scheme === 'dark' ? '#1c1c1e' : '#f3f4f6');

      const card   = scheme === 'dark' ? 'rgba(255,255,255,.05)' : 'rgba(255,255,255,.65)';
      const border = scheme === 'dark' ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.10)';
      const fieldBg= scheme === 'dark' ? 'rgba(255,255,255,.06)' : '#ffffff';
      const fBorder= scheme === 'dark' ? 'rgba(255,255,255,.14)' : 'rgba(0,0,0,.15)';
      const focus  = scheme === 'dark' ? 'rgba(46,212,191,.28)' : 'rgba(46,212,191,.35)';

      const s = document.documentElement.style;
      s.setProperty('--bg', bg);
      s.setProperty('--text', text);
      s.setProperty('--hint', hint);
      s.setProperty('--button', button);
      s.setProperty('--button_text', buttonText);
      s.setProperty('--secondary_bg', secondaryBg);
      s.setProperty('--card_bg', card);
      s.setProperty('--border', border);
      s.setProperty('--field_bg', fieldBg);
      s.setProperty('--field_border', fBorder);
      s.setProperty('--field_focus', focus);

      if (typeof tg.setBackgroundColor === 'function') { try { tg.setBackgroundColor(bg); } catch(e){} }
      if (typeof tg.setHeaderColor === 'function')     { try { tg.setHeaderColor(bg); } catch(e){} }
    }
    applyTheme();
    if (typeof tg.onEvent === 'function') tg.onEvent('themeChanged', applyTheme);

    /* ---------------- Fullscreen toggle (desktop only — hidden on mobile via CSS) ---------------- */
    const fsBtn = document.getElementById('fsBtn');
    const fsExpand = document.getElementById('fsExpand');
    const fsCompress = document.getElementById('fsCompress');
    function updateFsIcon(){
      const on = !!tg.isFullscreen;
      fsExpand.style.display = on ? 'none' : 'block';
      fsCompress.style.display = on ? 'block' : 'none';
    }
    fsBtn.onclick = () => {
      if (typeof tg.requestFullscreen !== 'function'){
        if (typeof tg.showAlert === 'function') tg.showAlert('Fullscreen is not supported on this Telegram version.');
        return;
      }
      if (tg.isFullscreen) tg.exitFullscreen(); else tg.requestFullscreen();
    };
    if (typeof tg.onEvent === 'function') tg.onEvent('fullscreenChanged', updateFsIcon);
    updateFsIcon();

    /* ---------------- Google Sheet (URL comes from the backend) ---------------- */
    const frame       = document.getElementById('sheetFrame');
    const emptyBox    = document.getElementById('sheetEmpty');
    const sheetEmoji  = document.getElementById('sheetEmoji');
    const sheetTitle  = document.getElementById('sheetTitle');
    const sheetText   = document.getElementById('sheetText');
    const genBtn      = document.getElementById('genBtn');
    const refreshBtn  = document.getElementById('refreshBtn');
    const refreshIcon = document.getElementById('refreshIcon');

    let statusMode = 'empty'; // 'empty' | 'cfg' | 'err' | 'loading' (only meaningful while emptyBox is shown)

    function applyEmptyText(){
      const map = {
        empty:   { emoji:'📊', title:'sheet.empty.title',   text:'sheet.empty.text',   showBtn:true  },
        loading: { emoji:'⏳', title:'sheet.loading.title', text:'sheet.loading.text', showBtn:false },
        cfg:     { emoji:'🔌', title:'cfg.title',           text:'cfg.text',           showBtn:false },
        err:     { emoji:'⚠️', title:'err.title',           text:'err.text',           showBtn:true  }
      };
      const m = map[statusMode] || map.empty;
      sheetEmoji.textContent = m.emoji;
      sheetTitle.textContent = t(m.title);
      sheetText.textContent  = t(m.text);
      genBtn.style.display   = m.showBtn ? '' : 'none';
    }

    function showEmpty(mode){
      statusMode = mode;
      frame.style.display = 'none';
      emptyBox.style.display = 'flex';
      refreshBtn.style.display = 'none';
      applyEmptyText();
    }

    function showFrame(url){
      frame.src = url;
      frame.style.display = '';
      emptyBox.style.display = 'none';
      refreshBtn.style.display = ''; // allow regenerating once a sheet exists
    }

    async function loadSheet(){
      if (!Lycee.configured){ showEmpty('cfg'); return; }
      try {
        const res = await Lycee.getSheetUrl();
        const url = res && res.url;
        if (url) showFrame(url); else showEmpty('empty');
      } catch(e){ console.error(e); showEmpty('err'); }
    }

    async function generate(){
      if (!Lycee.configured){ showEmpty('cfg'); return; }
      const hadSheet = frame.style.display !== 'none';
      refreshBtn.disabled = true;
      refreshIcon.classList.add('spin');
      if (!hadSheet) showEmpty('loading');
      try {
        const res = await Lycee.createSheet();
        const url = res && res.url;
        if (url) showFrame(url); else showEmpty('err');
      } catch(e){ console.error(e); showEmpty('err'); }
      finally { refreshBtn.disabled = false; refreshIcon.classList.remove('spin'); }
    }

    genBtn.onclick = generate;
    refreshBtn.onclick = generate;

    async function updateBadge(){
      if (!Lycee.configured) return;
      try {
        const tx = await Lycee.getTransactions();
        document.getElementById('countBadge').textContent = (tx || []).length;
      } catch(e){ /* ignore badge errors */ }
    }

    /* ---------------- Init ---------------- */
    applyI18n();
    (async () => {
      try { await Lycee.ensureUser(); } catch(e){ console.error(e); }
      updateBadge();
      loadSheet();
    })();
  </script>
</body>
</html>
